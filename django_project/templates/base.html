<!--templates/base.html-->
{% load static %}

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hritik Saynganthone</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>

<body>
    <div class="banner">
        <nav>
            <span class="logo">saynganth<span>.one</span></span>
            <ul>
                {% url 'home' as home_url %}
                <li><a href="{{ home_url }}" class="{% if request.path != home_url %}muted{% endif %}">HOME</a></li>

                {% url 'projects' as projects_url %}
                <li><a href="{{ projects_url }}" class="{% if request.path != projects_url %}muted{% endif %}">PROJECTS</a></li>

                {% url 'thesis' as thesis_url %}
                <li><a href="{{ thesis_url }}" class="{% if request.path != thesis_url %}muted{% endif %}">THESIS</a></li>
            </ul>
        </nav>
    </div>

    <div class="wrap">
        {% block content %}
        {% endblock content %}

        <footer id="contact">
            <span>HRITIK SAYNGANTHONE, MMXXVI</span>
            <span class="sig">saynganth.one</span>
        </footer>

    </div>
</body>

</html>
