services:
  db:
    image: postgres:17-alpine
    container_name: postgres-db
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USERNAME}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - postgres_data:/etc/data
    restart: always

  db-migration:
    build:
      context: django_project
      dockerfile: Dockerfile
    command: python manage.py migrate
    working_dir: /app
    container_name: django-migrations
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./django_project:/app

  web-server:
    build:
      context: ./django_project
      dockerfile: Dockerfile
    command: gunicorn --bind 0.0.0.0:2680 --workers 25 django_project.wsgi
    working_dir: /app
    container_name: django-server
    expose:
      - 2680
    env_file: .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
      db-migration:
        condition: service_completed_successfully
      static-collection:
        condition: service_completed_successfully
    volumes:
      - ./django_project:/app
    restart: always

  static-collection:
    build:
      context: ./django_project
      dockerfile: Dockerfile
    command: python manage.py collectstatic --no-input --clear
    working_dir: /app
    container_name: django-collectstatic
    env_file: .env
    volumes:
      - ./django_project:/app
      - static_volume:/app/staticfiles/

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "8080:80"
    depends_on:
      web-server:
        condition: service_started
    volumes:
      - static_volume:/app/staticfiles/:ro
    restart: always

volumes:
  static_volume:
  postgres_data:
    driver: local